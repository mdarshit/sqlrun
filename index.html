<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23131318'/%3E%3Cpath d='M8 20l6-10M18 10l6 10' stroke='%238f7ff7' stroke-width='3' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="sqlrun - format, minify, obfuscate and validate SQL, JSON and JavaScript. Local, offline, instant." />
    <meta name="color-scheme" content="dark light" />
    <title>sqlrun</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem('sqlrun:theme') || ''
        document.documentElement.dataset.theme = t.includes('light') ? 'light' : 'dark'
      } catch (e) {}
    </script>
    <style>
      html { background: #0c0c10; }
      html[data-theme='light'] { background: #eef0f7; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
