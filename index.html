<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23ffffff'/%3E%3Cpath d='M7 8h18L17 19v4h-2v-4L7 8Z' fill='%2317212B'/%3E%3Crect x='13' y='25' width='6' height='4' rx='1' fill='%2300A6A6'/%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sift - format, minify, obfuscate and validate SQL, JSON and JavaScript. Local, offline, instant." />
    <meta name="color-scheme" content="dark light" />
    <title>Sift</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem('sift:theme') || ''
        document.documentElement.dataset.theme = t.includes('light') ? 'light' : 'dark'
      } catch (e) {}
    </script>
    <style>
      html { background: #0c0c10; }
      html[data-theme='light'] { background: #eef0f7; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
